<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然探險家 - 戳戳樂複習遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: #f0fdf4; /* Light green background */
        }
        .punch-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 0.5rem;
            max-width: 800px;
            margin: 0 auto;
        }
        @media (max-width: 640px) {
            .punch-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }
        .punch-cell {
            aspect-ratio: 1 / 1;
            background-color: #fca5a5; /* Reddish cover */
            border: 2px dashed #b91c1c;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #7f1d1d;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .punch-cell:hover {
            transform: scale(1.05);
            background-color: #f87171;
        }
        .punch-cell.punched {
            background-color: #e5e7eb; /* Gray inner */
            border: 2px solid #9ca3af;
            color: #4b5563;
            cursor: default;
            transform: none;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1);
        }
        .punch-cell.punched::before {
             content: "✓";
             position: absolute;
             font-size: 2rem;
             color: #10b981; /* Green check */
        }
        .punch-cell.punched.wrong::before {
             content: "✗";
             color: #ef4444; /* Red cross */
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 50;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            animation: slideIn 0.3s ease-out forwards;
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* Options Styling */
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 1rem;
            margin-bottom: 0.5rem;
            background-color: #f3f4f6;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.1rem;
        }
        .option-btn:hover {
            background-color: #e0e7ff;
            border-color: #818cf8;
        }
        .option-btn.selected {
            background-color: #c7d2fe;
            border-color: #4f46e5;
        }
        
        .hint-box {
            display: none;
            background-color: #fef08a;
            border-left: 4px solid #eab308;
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 0 0.5rem 0.5rem 0;
            color: #854d0e;
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <header class="bg-green-600 text-white p-6 shadow-md text-center">
        <h1 class="text-3xl md:text-4xl font-extrabold mb-2">🌿 自然探險家：戳戳樂大挑戰 🔬</h1>
        <p class="text-green-100 text-lg">五年級自然 - 生鏽與食物保存 ＆ 生態與生物體</p>
        <div class="mt-4 flex justify-center gap-4 text-sm font-semibold">
            <span class="bg-green-700 px-3 py-1 rounded-full">已戳開：<span id="progress-count">0</span> / 40</span>
            <span class="bg-green-700 px-3 py-1 rounded-full">得分：<span id="score-display">0</span></span>
        </div>
    </header>

    <main class="container mx-auto mt-8 px-4">
        <div class="text-center mb-6">
            <p class="text-gray-700 text-lg">點擊下面的格子，回答問題來收集探險積分吧！</p>
        </div>
        <div id="game-grid" class="punch-grid">
            <!-- JavaScript will populate 40 cells here -->
        </div>
    </main>

    <div id="question-modal" class="modal">
        <div class="modal-content border-t-8 border-green-500">
            <div class="flex justify-between items-start mb-4">
                <h2 class="text-xl font-bold text-gray-800">第 <span id="q-number">1</span> 題</h2>
                <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded border border-blue-400" id="q-category">分類</span>
            </div>
            
            <p id="q-text" class="text-lg text-gray-700 mb-6 font-medium tracking-wide"></p>
            
            <div id="q-options" class="mb-6">
                <!-- Options injected by JS -->
            </div>

            <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                <button id="btn-hint" class="flex items-center gap-2 text-yellow-600 hover:text-yellow-700 font-semibold transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                    </svg>
                    需要提示嗎？
                </button>
                <button id="btn-submit" class="bg-green-500 hover:bg-green-600 text-white px-8 py-2 rounded-full font-bold shadow-lg transform transition-transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed">
                    確認送出
                </button>
            </div>

            <div id="hint-container" class="hint-box mt-4">
                <strong class="block mb-1">💡 探險提示：</strong>
                <span id="hint-text"></span>
            </div>

            <!-- Feedback overlay inside modal -->
            <div id="feedback-overlay" class="hidden absolute inset-0 bg-white bg-opacity-90 flex flex-col items-center justify-center rounded-xl z-10">
                <div id="feedback-icon" class="text-6xl mb-4"></div>
                <h3 id="feedback-title" class="text-2xl font-bold mb-2"></h3>
                <p id="feedback-desc" class="text-gray-600 text-center px-6 mb-6"></p>
                <button id="btn-close-modal" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-full font-bold shadow">
                    繼續探險
                </button>
            </div>
        </div>
    </div>

    <div id="report-modal" class="modal">
        <div class="modal-content border-t-8 border-yellow-500 text-center">
            <h1 class="text-4xl font-extrabold text-yellow-600 mb-2">🎉 恭喜過關！ 🎉</h1>
            <h2 class="text-2xl font-bold text-gray-800 mb-6">恭喜成為自然探險家</h2>
            
            <div class="bg-gray-100 rounded-lg p-6 mb-6 shadow-inner">
                <div class="grid grid-cols-2 gap-4 text-lg">
                    <div class="text-right font-semibold text-gray-600">完成題數：</div>
                    <div class="text-left font-bold text-blue-600">40 / 40</div>
                    
                    <div class="text-right font-semibold text-gray-600">答對題數：</div>
                    <div class="text-left font-bold text-green-600" id="report-correct">0</div>
                    
                    <div class="text-right font-semibold text-gray-600">使用提示次數：</div>
                    <div class="text-left font-bold text-yellow-600" id="report-hints">0</div>
                    
                    <div class="text-right font-semibold text-gray-600">總得分：</div>
                    <div class="text-left font-bold text-red-600 text-2xl" id="report-score">0</div>
                </div>
            </div>

            <!-- 迷思概念診斷區塊 -->
            <div id="weakness-section" class="mb-6 text-left hidden">
                <h3 class="text-xl font-bold text-red-500 mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                    發現迷思概念
                </h3>
                <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                    <p class="text-sm text-red-700 font-semibold mb-2">根據作答結果，你對以下主題還有些不熟悉，建議多複習喔：</p>
                    <ul id="weakness-list" class="list-disc list-inside text-gray-800 space-y-1 font-medium"></ul>
                </div>
            </div>

            <!-- 重點整理複習區塊 -->
            <div id="review-section" class="mb-8 text-left">
                <h3 class="text-xl font-bold text-green-600 mb-2 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                    專屬重點整理小秘笈
                </h3>
                <div id="review-content" class="bg-green-50 border border-green-200 rounded-lg p-4 text-sm text-gray-800 space-y-3 shadow-inner">
                    <!-- 動態載入重點內容 -->
                </div>
            </div>
            
            <p class="text-gray-600 mb-8 font-bold" id="report-message"></p>
            
            <button onclick="location.reload()" class="bg-gradient-to-r from-yellow-400 to-orange-500 hover:from-yellow-500 hover:to-orange-600 text-white px-8 py-3 rounded-full font-bold shadow-lg transform transition-transform hover:scale-105">
                再玩一次，挑戰滿分！
            </button>
        </div>
    </div>

            { id: 29, type: "choice", category: "生態系", text: "生物之間藉由「吃與被吃」的關係，將能量連結在一起，稱為什麼？", options: ["食物網", "食物鏈", "共生圈", "營養線"], answer: 1, hint: "像一條鍊子一樣把生物串起來。" },
            { id: 30, type: "tf", category: "生態系", text: "在食物鏈中，綠色植物或藻類可以直接利用日光行光合作用，被稱為「消費者」。", options: ["錯", "對"], answer: 0, hint: "自己製造養分的叫做「生產者」。" },
            { id: 31, type: "choice", category: "生態系", text: "以植物為食的草食性動物（如昆蟲、斑馬），在營養階層中屬於什麼？", options: ["生產者", "二級消費者", "一級消費者", "分解者"], answer: 2, hint: "牠們是第一個吃植物的動物。" },
            { id: 32, type: "tf", category: "生態系", text: "肉食性動物以其他動物為食，在食物鏈中屬於「二級消費者」或更高級的消費者。", options: ["對", "錯"], answer: 0, hint: "例如吃小魚的小白鷺就是二級消費者。" },
            { id: 33, type: "choice", category: "生態系", text: "下列哪一個食物鏈的順序是正確的？", options: ["藻類 → 虱目魚 → 小白鷺", "小白鷺 → 虱目魚 → 藻類", "虱目魚 → 藻類 → 小白鷺", "藻類 → 小白鷺 → 虱目魚"], answer: 0, hint: "能量是從生產者開始，依序被吃掉傳遞上去的。" },
            { id: 34, type: "tf", category: "動物行為", text: "像螞蟻這樣群體生活在一起，並且有分工合作的社會性行為，稱為「社會性的動物」。", options: ["對", "錯"], answer: 0, hint: "蜜蜂也是有名的社會性動物。" },
            { id: 35, type: "choice", category: "動物行為", text: "在螞蟻的社會中，體型最大、專門「負責產卵」的是誰？", options: ["雄蟻", "兵蟻", "工蟻", "蟻后"], answer: 3, hint: "她是整個蟻群的媽媽。" },
            { id: 36, type: "tf", category: "動物行為", text: "螞蟻窩裡數量最龐大的是「兵蟻」，牠們負責擔任清潔、覓食和育幼等工作。", options: ["錯", "對"], answer: 0, hint: "負責做家事和找食物的叫做「工蟻」，兵蟻負責防禦喔！" },
            { id: 37, type: "choice", category: "動物行為", text: "蜜蜂通常會用什麼方式來向同伴傳達「蜜源在哪裡」的訊息？", options: ["發出氣味", "跳舞蹈", "發光", "大聲鳴叫"], answer: 1, hint: "牠們會在空中飛出像「8」字型的圖案。" },
            { id: 38, type: "tf", category: "動物行為", text: "海豚在海中會利用不同的「聲音」來彼此交換訊息。", options: ["對", "錯"], answer: 0, hint: "海豚的叫聲非常多變，是牠們溝通的重要方式。" },
            { id: 39, type: "choice", category: "動物行為", text: "螞蟻在外出覓食時，主要利用什麼來標記行進路線？", options: ["腳印", "聲音", "氣味", "視覺"], answer: 2, hint: "所以牠們常常排成一直線前進。" },
            { id: 40, type: "tf", category: "動物行為", text: "如果我們阻斷了螞蟻原本行進的路線，螞蟻可能會因為找不到原本留下的氣味而無法依循路線移動。", options: ["對", "錯"], answer: 0, hint: "氣味路線一斷，螞蟻就會暫時迷路了。" },
            { id: 41, type: "choice", category: "生態系", text: "同一棲地的族群間，一種生物捕捉並吃掉另一種生物，這屬於什麼關係？", options: ["競爭", "共生", "掠食", "寄生"], answer: 2, hint: "就像獅子抓羚羊來吃一樣。" },
            { id: 42, type: "tf", category: "生態系", text: "兩隻生物為了爭奪食物、居所或交配權而打架，這種關係稱為「競爭」。", options: ["對", "錯"], answer: 0, hint: "資源有限時，生物之間就會發生競爭。" },
            { id: 43, type: "choice", category: "生態系", text: "不同生物形成緊密關係，可能一方受益一方無害，或雙方都受益，這稱為什麼？", options: ["共生", "競爭", "寄生", "掠食"], answer: 0, hint: "大家和平相處，一起生活。" },
            { id: 44, type: "tf", category: "生態系", text: "寄生物依附在寄主身上獲取利益，而且寄主會受到傷害，這稱為「寄生」。", options: ["對", "錯"], answer: 0, hint: "例如吸血的跳蚤或蝨子。" },
            { id: 45, type: "choice", category: "生物體", text: "人體器官是由哪一個「最基本的單位」所組成的？", options: ["組織", "系統", "細胞", "骨骼"], answer: 2, hint: "它是構成生物體最小的活體積木。" },
            { id: 46, type: "tf", category: "生物體", text: "人體的組成層次由小到大依序是：細胞 → 組織 → 器官 → 器官系統 → 個體。", options: ["對", "錯"], answer: 0, hint: "這是一個從小零件組合成大機器的概念。" },
            { id: 47, type: "choice", category: "生物體", text: "許多功能相近的「細胞」聚集在一起，會形成什麼？", options: ["器官", "組織", "系統", "個體"], answer: 1, hint: "例如皮膜組織、肌肉組織。" },
            { id: 48, type: "tf", category: "生物體", text: "口腔、食道、胃、大腸、小腸等不同的「器官」，共同組成了我們的「消化器官系統」。", options: ["對", "錯"], answer: 0, hint: "這些器官合作完成把食物消化吸收的任務。" },
            { id: 49, type: "choice", category: "生物體", text: "動物為了生存，除了需要防禦天敵，攝取什麼來獲得能量和養分更是維持生命的關鍵？", options: ["石頭", "食物", "泥土", "空氣而已"], answer: 1, hint: "肚子餓了就要吃東西。" },
            { id: 50, type: "tf", category: "生物體", text: "人類攝取的食物，必須經過消化系統的處理，才能將養分吸收並送往全身利用。", options: ["對", "錯"], answer: 0, hint: "胃和腸子負責把大塊食物變成小分子的養分。" },

            // --- 4-2 動物的生存之道 (25題) ---
            { id: 51, type: "choice", category: "動物適應", text: "人類或許多動物在運動時，主要是由哪三個構造互相配合完成的？", options: ["血液、神經、心臟", "骨骼、肌肉、關節", "皮膚、毛髮、指甲", "胃、腸、肝臟"], answer: 1, hint: "骨頭負責支撐，肌肉負責拉動，關節負責彎曲。" },
            { id: 52, type: "tf", category: "動物適應", text: "當我們手臂彎曲時，是因為手臂「內側」的肌肉收縮，而外側的肌肉舒張。", options: ["對", "錯"], answer: 0, hint: "肌肉一縮短，就會拉動骨頭彎起來。" },
            { id: 53, type: "choice", category: "動物適應", text: "沒有骨骼的動物（例如蝸牛和蚯蚓），是利用什麼方式使身體前進？", options: ["利用關節滑動", "利用翅膀飛行", "利用肌肉的伸縮", "在地上滾動"], answer: 2, hint: "牠們的身體軟軟的，靠著肌肉一長一短來爬行。" },
            { id: 54, type: "tf", category: "動物適應", text: "動物為了求生存必須覓食，而牠們的「覓食方式」通常與其「身體構造」息息相關。", options: ["對", "錯"], answer: 0, hint: "長什麼樣的嘴巴，就吃什麼樣的食物。" },
            { id: 55, type: "choice", category: "動物適應", text: "柑橘鳳蝶主要是利用什麼樣的構造來吸食花蜜？", options: ["長長的鼻子", "強壯的爪子", "像吸管的口器", "快速伸長的舌頭"], answer: 2, hint: "像我們喝飲料用的管子一樣。" },
            { id: 56, type: "tf", category: "動物適應", text: "變色龍在捕食昆蟲時，會利用牠強壯的爪子抓住獵物。", options: ["錯", "對"], answer: 0, hint: "變色龍是利用『可快速伸長的舌頭』黏住獵物喔！強壯爪子是老鷹的特徵。" },
            { id: 57, type: "choice", category: "動物適應", text: "老鷹（鷹）捕捉地上的獵物時，主要利用哪個身體構造？", options: ["強壯的爪子", "長長的鼻子", "像吸管的口器", "長舌頭"], answer: 0, hint: "猛禽的標準配備，非常銳利。" },
            { id: 58, type: "tf", category: "動物適應", text: "大象覓食時，會利用長長的鼻子抓取食物放進口中。", options: ["對", "錯"], answer: 0, hint: "大象的鼻子就像我們的手一樣靈活。" },
            { id: 59, type: "choice", category: "體溫調節", text: "根據動物調節體溫的方式，科學家將動物分為哪兩大類？", options: ["草食動物與肉食動物", "水生動物與陸生動物", "內溫動物與外溫動物", "卵生動物與胎生動物"], answer: 2, hint: "跟動物怎麼控制身體的「溫度」有關。" },
            { id: 60, type: "tf", category: "體溫調節", text: "「內溫動物」是利用身體內部所產生的熱來維持體溫，體溫變化不大。", options: ["對", "錯"], answer: 0, hint: "我們人類也是內溫動物喔！" },
            { id: 61, type: "choice", category: "體溫調節", text: "下列哪一組動物屬於「內溫動物」？", options: ["爬蟲類、昆蟲", "哺乳類、鳥類", "兩生類、魚類", "蝸牛、蚯蚓"], answer: 1, hint: "有羽毛或毛髮保暖的動物群。" },
            { id: 62, type: "tf", category: "體溫調節", text: "「外溫動物」的體溫會隨著環境溫度而改變，牠們常需要從外界環境吸收熱或降溫。", options: ["對", "錯"], answer: 0, hint: "所以蜥蜴常常需要趴在石頭上曬太陽。" },
            { id: 63, type: "choice", category: "體溫調節", text: "下列哪一種動物屬於「外溫動物」？", options: ["企鵝(鳥類)", "鯨魚(哺乳類)", "獅子(哺乳類)", "青蛙(兩生類)"], answer: 3, hint: "冬天很冷的時候，牠的體溫也會跟著變冷。" },
            { id: 64, type: "tf", category: "體溫調節", text: "外溫動物（如爬蟲類、昆蟲）在天氣熱的時候，可能會躲在陰涼處來調整行為降溫。", options: ["對", "錯"], answer: 0, hint: "因為牠們無法靠自己流汗散熱，只能換個地方躲。" },
            { id: 65, type: "choice", category: "動物適應", text: "當我們手臂伸直時，肌肉的狀態是如何變化的？", options: ["內側收縮、外側舒張", "內側舒張、外側收縮", "兩邊同時收縮", "兩邊同時舒張"], answer: 1, hint: "跟彎曲時剛好相反喔！手臂外側的三頭肌要用力拉直。" },
            { id: 66, type: "tf", category: "動物行為", text: "有些動物會隨著季節的變化，遷移到適合的環境生長、覓食或繁殖，例如紫斑蝶冬天會到南部山谷度冬。", options: ["對", "錯"], answer: 0, hint: "黑面琵鷺也是為了躲避北方的寒冬飛來臺灣。" },
            { id: 67, type: "choice", category: "體溫調節", text: "如果氣溫突然從30度降到10度，下列哪一種動物的體溫『不會』跟著劇烈下降？", options: ["蛇(爬蟲類)", "人類(哺乳類)", "金魚(魚類)", "蝴蝶(昆蟲)"], answer: 1, hint: "哺乳動物是內溫動物，會自動產熱保暖。" },
            { id: 68, type: "tf", category: "體溫調節", text: "內溫動物也需要適度的散熱和保溫，才能將體溫維持在一定的範圍內。", options: ["對", "錯"], answer: 0, hint: "夏天流汗、冬天發抖，都是維持體溫的方法。" },
            { id: 69, type: "choice", category: "動物適應", text: "蝸牛在地上爬行時，我們『看不到』哪種構造？", options: ["肌肉", "殼", "觸角", "關節與骨骼"], answer: 3, hint: "蝸牛是軟體動物，體內沒有硬硬的骨架。" },
            { id: 70, type: "tf", category: "動物適應", text: "各種動物為了生存，演化出不同的構造和行為，這都是為了適應牠們所處的環境。", options: ["對", "錯"], answer: 0, hint: "這就是自然界奇妙的生存之道。" },
            { id: 71, type: "choice", category: "生態系", text: "當森林發生大火，草食動物和肉食動物都會逃跑，這時牠們之間原本的什麼關係會被中斷？", options: ["共生", "食物鏈(吃與被吃)", "寄生", "合作"], answer: 1, hint: "大家都忙著逃命，沒空吃別人了。" },
            { id: 72, type: "tf", category: "生物體", text: "心臟、肺臟、胃等都是由組織構成的「器官」，單一器官就能獨立完成消化吸收的所有工作。", options: ["錯", "對"], answer: 0, hint: "消化吸收需要口腔、食道、胃、腸等器官組成「系統」一起合作才能完成。" },
            { id: 73, type: "choice", category: "體溫調節", text: "觀察「外溫動物」的體溫變化圖表，體溫線條通常會呈現什麼形狀？", options: ["一直保持水平", "像波浪一樣隨環境起伏", "一直線往上飆升", "一直線往下掉"], answer: 1, hint: "環境熱牠就熱，環境冷牠就冷。" },
            { id: 74, type: "tf", category: "動物適應", text: "雖然動物有不同的覓食方式，但最終目的都是從食物中獲得維持生命所需的「能量」。", options: ["對", "錯"], answer: 0, hint: "食物就是生物的電池燃料。" },
            { id: 75, type: "choice", category: "生態系", text: "在同一棲地中，小鳥吃毛毛蟲，這屬於生物間交互作用中的哪一種？", options: ["競爭", "共生", "掠食", "寄生"], answer: 2, hint: "一方把另一方吃掉的行為。" },

            // --- 4-3 動物的生命延續 (25題) ---
            { id: 76, type: "choice", category: "生殖方式", text: "動物會利用聲音、氣味、發光、舞蹈等方式吸引異性，達到交配繁殖的目的，這稱為什麼行為？", options: ["禦敵行為", "求偶行為", "覓食行為", "育幼行為"], answer: 1, hint: "尋找另一半的舉動。" },
            { id: 77, type: "tf", category: "生殖方式", text: "雌蠶蛾會散發出特殊的「氣味」，而雄蠶蛾會利用觸角來尋找雌蛾。", options: ["對", "錯"], answer: 0, hint: "昆蟲常利用這種化學物質(費洛蒙)來溝通求偶。" },
            { id: 78, type: "choice", category: "生殖方式", text: "哪一種動物的雄性，會張開絢麗的尾羽並不斷抖動，千方百計引誘雌鳥？", options: ["老鷹", "孔雀", "麻雀", "烏鴉"], answer: 1, hint: "這叫做「開屏」。" },
            { id: 79, type: "tf", category: "生殖方式", text: "在求偶季時，雄黃緣螢會一邊飛舞一邊發光，而雌蟲會停在草叢中發出螢光回應，來吸引雄蟲。", options: ["對", "錯"], answer: 0, hint: "夏夜的閃爍燈光就是牠們的愛情暗號。" },
            { id: 80, type: "choice", category: "生殖方式", text: "繁殖季時，雄彈塗魚會豎起背鰭，並在泥地上做出什麼動作來吸引母魚？", options: ["大聲唱歌", "轉圈跳舞", "挖洞躲起來", "發出螢光"], answer: 1, hint: "牠們會在濕地上活蹦亂跳。" },
            { id: 81, type: "tf", category: "生殖方式", text: "動物的繁殖方式主要有「卵生」和「胎生」，這兩種的胚胎養分來源和產出型態都一樣。", options: ["錯", "對"], answer: 0, hint: "一個生蛋(養分來自卵)，一個生出小寶寶(養分來自媽媽)，完全不一樣喔！" },
            { id: 82, type: "choice", category: "生殖方式", text: "動物將卵排出體外，再孵化出小動物的生殖方式叫做？", options: ["胎生", "分裂生殖", "卵生", "出芽生殖"], answer: 2, hint: "有殼或軟軟的蛋在外面孵化。" },
            { id: 83, type: "tf", category: "生殖方式", text: "卵生動物（如鳥類、蛙類、烏龜）在孵化期間，胚胎發育所需的養分完全由「母體」血液提供。", options: ["錯", "對"], answer: 0, hint: "既然蛋已經生出來了，養分當然是靠蛋裡面的「卵黃」提供囉。" },
            { id: 84, type: "choice", category: "生殖方式", text: "胎兒在母體內發育完全後才生出來，且胚胎養分來自母體，這稱為什麼？", options: ["卵生", "胎生", "卵胎生", "寄生"], answer: 1, hint: "大多數哺乳類(含人類)都是這種方式。" },
            { id: 85, type: "tf", category: "生殖方式", text: "貓、狗、羊、人和海豚，這些動物的生殖方式都屬於「胎生」。", options: ["對", "錯"], answer: 0, hint: "牠們的寶寶都是在媽媽肚子裡吸收營養長大才生出來的。" },
            { id: 86, type: "choice", category: "動物行為", text: "親鳥為了保護幼鳥免受天敵攻擊，可能會假裝自己受傷來引開敵人，這稱為什麼行為？", options: ["求偶行為", "擬傷行為(育幼)", "覓食行為", "競爭行為"], answer: 1, hint: "這是一種偉大的母愛表現，用苦肉計騙走敵人。" },
            { id: 87, type: "tf", category: "動物行為", text: "動物的護幼和育幼行為，主要的目的是為了「提高子代(幼兒)的生存機率」。", options: ["對", "錯"], answer: 0, hint: "保護寶寶平安長大。" },

            btnSubmit.disabled = true;

            qCategory.textContent = qData.category;
            qText.textContent = qData.text;
            hintText.textContent = qData.hint;

            // Populate Options
            qOptionsContainer.innerHTML = '';
            qData.options.forEach((optText, optIndex) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = optText;
                btn.addEventListener('click', () => selectOption(optIndex, btn));
                qOptionsContainer.appendChild(btn);
            });

            modal.style.display = 'block';

            gameState.selectedOptionIndex = index;

            const allOptions = qOptionsContainer.querySelectorAll('.option-btn');
            allOptions.forEach(btn => btn.classList.remove('selected'));
            btnElement.classList.add('selected');
            
            btnSubmit.disabled = false;

            gameState.punchedCells++;

                    const div = document.createElement('div');
                    div.className = "mt-6 pt-4 border-t-2 border-dashed border-gray-300";
                    div.innerHTML = "<h4 class='text-lg font-bold text-blue-600 mb-4 flex items-center gap-2'><svg xmlns='http://www.w3.org/2000/svg' class='h-5 w-5' viewBox='0 0 20 20' fill='currentColor'><path fill-rule='evenodd' d='M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z' clip-rule='evenodd' /></svg> 其他核心觀念複習：</h4>";
                    
                    const extraContainer = document.createElement('div');
                    extraContainer.className = "space-y-4";
                    // 避免重複加入
                    if(!wrongTopics.some(t => t.includes("生鏽"))) { extraContainer.appendChild(extraP1); }
                    if(!wrongTopics.some(t => t.includes("生態"))) { extraContainer.appendChild(extraP2); }
                    
                    if(extraContainer.childNodes.length > 0) { 
                        div.appendChild(extraContainer);
                        reviewContent.appendChild(div); 
                    }
                }

            } else {
                // 全部答對的情況
                weaknessSection.classList.add('hidden');
                reviewContent.innerHTML = `
                    <div class="text-center py-4">
                        <span class="text-4xl mb-2 block">🏆</span>
                        <p class="text-lg font-bold text-green-700">太完美了！你完全沒有迷思概念！</p>
                        <p class="text-sm mt-2">你已經充分掌握了五年級自然科學「生鏽與食物保存」及「生態系」的所有重點，簡直是科學小天才！</p>
                    </div>
                `;
            }

            let msg = "";
            if (gameState.score >= 350) {
                msg = "太強了！你是名副其實的「自然科學大師」！💯";
            } else if (gameState.score >= 250) {
                msg = "很不錯喔！你已經具備「自然探險家」的實力了！🌟";
            } else {
                msg = "繼續加油！多複習重點，下次一定可以挑戰更高分！💪";
            }
            document.getElementById('report-message').textContent = msg;
            
            reportModal.style.display = 'block';
        }

        // Start Game
        window.onload = initGrid;

    </script>
</body>
</html>
